name: Build and Deploy

on:
  push:
    branches: ["main"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # LOGIN TO GHCR
      - name: Login to GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      # BUILD IMAGE
      - name: Build Docker image
        run: |
          docker build -t ghcr.io/${{ github.actor }}/irig-poker-api:latest .

      # PUSH IMAGE
      - name: Push Docker image
        run: |
          docker push ghcr.io/${{ github.actor }}/irig-poker-api:latest

      # BUILD UI IMAGE
      - name: Build UI
        run: |
          docker build \
            -t ghcr.io/${{ github.actor }}/irig-poker-ui:latest \
            --build-arg VITE_API_BASE_URL= \
            ./UI

      # PUSH UI IMAGE
      - name: Push UI
        run: |
          docker push ghcr.io/${{ github.actor }}/irig-poker-ui:latest
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            cd ${{ vars.DOCKER_COMPOSE_DIR }}
            docker compose pull
            docker compose up -d
